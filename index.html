<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D灰太狼打坦克</title>
    <style>
        * { margin:0; padding:0; }
        html, body { width:100%; height:100%; overflow:hidden; background:#000; }
        canvas { display:block; width:100%; height:100%; background:#000; }
        #loading {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            color:#fff; font-family:Arial,sans-serif; font-size:18px;
            pointer-events:none; user-select:none; z-index:10;
        }
    </style>
</head>
<body>
    <div id="loading">加载中，请稍候…</div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        var Module = {
            TOTAL_MEMORY: 268435456,
            dataUrl: "Release/web.data",
            codeUrl: "Release/web.js",
            memUrl: "Release/web.mem",
            setStatus: function(text) {
                var el = document.getElementById('loading');
                if (!el) return;
                if (text === '') {
                    el.style.display = 'none';
                } else {
                    var match = text.match(/([^(]+)/);
                    el.textContent = match ? match[0] : text;
                }
            }
        };
    </script>
    <script src="Release/UnityLoader.js"></script>
</body>
</html>
